<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Digital Builder - Editor</title>
    <style>
        /* --- Modern CSS Reset & Setup --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            touch-action: none; /* Prevents mobile pull-to-refresh */
        }
        canvas { display: block; }

        /* --- Professional Glassmorphism UI --- */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-width: calc(100vw - 40px);
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            color: #e0e0e0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 { font-size: 1.2rem; color: #fff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        
        /* --- Controls --- */
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        
        button {
            background: #2a2a35;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-weight: 600;
        }
        button:hover { background: #3f3f5a; border-color: #6c6cf5; }
        button.danger:hover { background: #5a2a2a; border-color: #f56c6c; }

        input[type="range"] { accent-color: #6c6cf5; cursor: pointer; }
        
        /* Hide default file input for custom button styling */
        input[type="file"] { display: none; }

        /* --- Stats Board --- */
        .stats-board {
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #6c6cf5; }
        .stat-value.status { color: #4caf50; font-size: 0.9rem; }
        
        /* Mobile adjustments */
        @media (max-width: 600px) {
            #ui-panel { top: 10px; left: 10px; padding: 15px; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <div>
        <h1>My Digital Builder</h1>
        <label>Autonomous Construction Unit</label>
    </div>

    <div class="control-group">
        <button id="btn-upload">Upload Blueprint (Image)</button>
        <input type="file" id="upload" accept="image/*">
    </div>

    <div class="control-group">
        <label>AI Movement Speed</label>
        <input type="range" id="speed-slider" min="0.05" max="0.5" step="0.05" value="0.2">
    </div>

    <div class="stats-board">
        <div class="stat-item">
            <span class="stat-value status" id="ui-state">DREAMING</span>
            <label>Current Task</label>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="ui-timer">360s</span>
            <label>Auto-Reset</label>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="ui-blocks">0</span>
            <label>Blocks Placed</label>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="ui-memory">0</span>
            <label>Learned Colors</label>
        </div>
    </div>

    <button class="danger" id="btn-reset">Purge Memory & Reset</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(25, 30, 35);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for mobile
    document.body.appendChild(renderer.domElement);

    // --- Camera Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Smooth inertia
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't allow camera to go below ground

    // --- Environment & Lighting ---
    scene.add(new THREE.AmbientLight(0x222222));
    
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // Grid Floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Grid Helper for aesthetics
    const gridHelper = new THREE.GridHelper(100, 100, 0x333333, 0x222222);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // --- AI Bot ---
    const botGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
    const botMat = new THREE.MeshStandardMaterial({ color: 0x6c6cf5, emissive: 0x3a3a8a });
    const bot = new THREE.Mesh(botGeo, botMat);
    bot.castShadow = true;
    scene.add(bot);

    // Bot Light
    const botLight = new THREE.PointLight(0x6c6cf5, 2, 10);
    botLight.position.set(0, 1, 0);
    bot.add(botLight);

    // --- State & Variables ---
    let blocks = [];
    let heightMap = new Map();
    let targetQueue = [];
    let learnedColors = [];
    let state = "DREAMING";
    let timeLeft = 360;
    let aiSpeed = 0.2;

    // --- UI Interactions ---
    const uiState = document.getElementById('ui-state');
    const uiTimer = document.getElementById('ui-timer');
    const uiBlocks = document.getElementById('ui-blocks');
    const uiMemory = document.getElementById('ui-memory');

    document.getElementById('speed-slider').addEventListener('input', (e) => {
        aiSpeed = parseFloat(e.target.value);
    });

    document.getElementById('btn-upload').addEventListener('click', () => {
        document.getElementById('upload').click();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        resetWorld(true);
    });

    // --- Core Functions ---
    function resetWorld(hardReset = false) {
        blocks.forEach(b => {
            b.geometry.dispose();
            b.material.dispose();
            scene.remove(b);
        });
        blocks = [];
        heightMap.clear();
        targetQueue = [];
        uiBlocks.innerText = "0";
        
        if (hardReset) {
            learnedColors = [];
            uiMemory.innerText = "0";
            timeLeft = 360;
            state = "DREAMING";
            uiState.innerText = state;
            uiState.style.color = "#4caf50";
        }
    }

    // Auto Reset Timer
    setInterval(() => {
        timeLeft--;
        uiTimer.innerText = `${timeLeft}s`;
        if (timeLeft <= 0) {
            resetWorld(true);
        }
    }, 1000);

    // Process Image
    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                resetWorld(); 
                state = "BLUEPRINT";
                uiState.innerText = state;
                uiState.style.color = "#f39c12";

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 40; canvas.height = 40;
                ctx.drawImage(img, 0, 0, 40, 40);
                const data = ctx.getImageData(0, 0, 40, 40).data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                    if (a === 0) continue; // Ignore transparent pixels
                    
                    const brightness = (r + g + b) / 3;
                    if (brightness > 20) {
                        const x = ((i/4) % 40 - 20) * 0.7;
                        const z = (Math.floor((i/4) / 40) - 20) * 0.7;
                        const color = new THREE.Color(`rgb(${r},${g},${b})`);
                        
                        if (!learnedColors.some(c => c.getHex() === color.getHex())) {
                            learnedColors.push(color);
                            uiMemory.innerText = learnedColors.length;
                        }

                        targetQueue.push({ x, z, color, maxH: Math.ceil(brightness / 50) });
                    }
                }
                // Reset file input
                e.target.value = '';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Main Animation Loop ---
    let currentGoal = null;

    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // Required for damping

        // State Machine
        if (targetQueue.length === 0) {
            if (state !== "DREAMING") {
                state = "DREAMING";
                uiState.innerText = state;
                uiState.style.color = "#4caf50";
            }
            
            // Dream Logic: Wander and build based on memory
            const randomColor = learnedColors.length > 0 
                ? learnedColors[Math.floor(Math.random() * learnedColors.length)] 
                : new THREE.Color(0x6c6cf5); // Default color if memory is empty
            
            targetQueue.push({
                x: (Math.floor(Math.random() * 40) - 20) * 0.7,
                z: (Math.floor(Math.random() * 40) - 20) * 0.7,
                color: randomColor,
                maxH: Math.floor(Math.random() * 4) + 1
            });
        }

        // Movement & Building Logic
        if (targetQueue.length > 0) {
            if (!currentGoal) currentGoal = targetQueue[0];

            const moveTarget = new THREE.Vector3(currentGoal.x, 0.3, currentGoal.z);
            bot.position.lerp(moveTarget, aiSpeed);

            if (bot.position.distanceTo(moveTarget) < 0.1) {
                const key = `${currentGoal.x.toFixed(2)},${currentGoal.z.toFixed(2)}`;
                let h = heightMap.get(key) || 0;

                if (h < currentGoal.maxH) {
                    const blockGeo = new THREE.BoxGeometry(0.65, 0.65, 0.65);
                    const blockMat = new THREE.MeshStandardMaterial({ 
                        color: currentGoal.color,
                        roughness: 0.3,
                        metalness: 0.2
                    });
                    const block = new THREE.Mesh(blockGeo, blockMat);
                    
                    block.position.set(currentGoal.x, (h * 0.65) + 0.325, currentGoal.z);
                    block.castShadow = true;
                    block.receiveShadow = true;
                    
                    scene.add(block);
                    blocks.push(block);
                    heightMap.set(key, h + 1);
                    
                    uiBlocks.innerText = blocks.length;
                } else {
                    targetQueue.shift();
                    currentGoal = null;
                }
            }
        }

        renderer.render(scene, camera);
    }
    
    animate();
</script>
</body>
</html>
